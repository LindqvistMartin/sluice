name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - run: go build ./...
      - run: go test -race ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
